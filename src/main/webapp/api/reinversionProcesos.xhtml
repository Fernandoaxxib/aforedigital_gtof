<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui">

<h:head>
	<h:outputScript library="js" name="calendar-localization.js" />
</h:head>

<h:body>
	<h:form id="form">
				<h:outputText value="#{msg.reinventir_proceso_proceso_ventas_txt_titulo}" />
				
				
				
			
					
				
				 
				<h:panelGrid columns="2" style="margin-bottom:10px" cellpadding="5">
        		<p:selectBooleanCheckbox value="#{reinversionProceso.value1}" itemLabel="Reporte de Cuenta Cancelada"/>
        		<p:selectBooleanCheckbox value="#{reinversionProceso.value2}" itemLabel="Obtener Saldos Actuales"/>
        		<p:selectBooleanCheckbox value="#{reinversionProceso.value3}" itemLabel="Reporte de Cuenta a Reinventir"/>
        		<p:selectBooleanCheckbox value="#{reinversionProceso.value4}" itemLabel="Reporte de Cuenta Cancelada"/>
   			
        		
   				 </h:panelGrid>
   				 
  						<p:panelGrid id="verEjecutarProceso"  columns="2"> 
	 								        
					   		<h:outputText value="#{msg.reinventir_proceso_txt_no_cuenta}" />
						   	<p:inputText id="noCuenta" value="#{reinversionProceso.noCuenta}" />   
					
							 <p:outputLabel for="fechaUltimo" value="#{msg.reinventir_proceso_txt_fecha_ultima}" />
			        		<p:datePicker id="fechaUltimo" value="#{reinversionProceso.fechaUltima}" showIcon="true" pattern="yyyy-MMM-dd" locale="es"/>
				
							<p:commandButton action="#{reinversionProceso.getEjecutar}"
							type="submit" value="#{msg.reinventir_proceso_boton_proceso}" ajax="false" />
 	
						</p:panelGrid> 
					
	 					<p:panelGrid id="verFechaActual"  columns="2"> 
									 <h3>VER:</h3>
									<h:outputText value="#{now}">
									<p:clock pattern="dd-MM-yyyy"/>
									</h:outputText> 				
 						</p:panelGrid> 
 
 					<p:growl id="growl" />  
						<h3>Ver Progreso</h3>  
						<p:commandButton value="Empezar" type="button" onclick="PF('pbAjax').start();PF('startButton2').disable();"   
						widgetVar="startButton2" />  
						<p:commandButton value="Cancelar" actionListener="#{reinversionProceso.cancel}"   
						oncomplete="PF('pbAjax').cancel();PF('startButton2').enable();" />  
						<br /><br />  
						<p:progressBar widgetVar="pbAjax" ajax="true" value="#{reinversionProceso.progress}"   
						labelTemplate="{value}%" styleClass="animated" global="false">  
						<p:ajax event="complete" listener="#{progressBar.onComplete}" update="growl"    
						oncomplete="PF('startButton2').enable()"/>  
						</p:progressBar>  
  	</h:form>
</h:body>
</html>
