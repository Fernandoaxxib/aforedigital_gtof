<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<ui:composition template="/view/layaut.xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

	<ui:define name="center">

		<h:outputScript name="js/calendar-localization.js" />
		<p:messages id="messages" showDetail="true" closable="true">

		</p:messages>
		
	<h:form id="form">

    <p:panelGrid id="verNNS"  columns="2">
      
   		<p:inputText id="nss" placeholder="#{msg.cheque_text_cheque_nss}"  value="#{verDatosChequenss}"/>
	    
   		
   		<p:commandButton action="#{consultaResolucionDataMart.getCuentaNombre}"
			type="submit" value="#{msg.cheque_boton_consultar}" ajax="false" />
	</p:panelGrid>	
		
	 <p:panelGrid id="verDetalle" columns="1">	
		<p:dataTable id="verTable"  var="ver" value="#{consultaResolucionDataMart.consultarNombreCuentaOut}">
		    <p:column headerText="#{msg.cheque_columna_codigo}">
		        <h:outputText value="#{ver.cuenta}" />
		    </p:column>
		 
		    <p:column headerText="#{msg.cheque_columna_nombre}">
		        <h:outputText value="#{ver.nombre}" />
		    </p:column>
		
		</p:dataTable>
	 <p:commandButton action="#{consultaResolucionDataMart.getConsultarTraspasos}"
			type="submit" value="#{msg.cheque_boton_consultar}" ajax="false" />

  	 </p:panelGrid>

		     <p:column headerText="#{msg.consulta_resolucion_data_mart_mov}">

		    <p:column headerText="#{msg.consulta_resolucion_data_mart_retiro_org}">
		        <h:outputText value="#{verDataMart.P_MONTO_RETIRO_ORG}" />

		    <p:column headerText="#{msg.consulta_resolucion_data_mart_saldo_ant}">
